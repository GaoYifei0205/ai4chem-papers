name: Update AI4Chem Papers

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允许手动触发（用于测试）
    inputs:
      target_date:
        description: '指定抓取日期 (YYYY-MM-DD)，留空则抓取昨天'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers and generate HTML
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python scripts/fetch_papers.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/papers.json index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json index.html
          git commit -m "chore: update papers $(date +'%Y-%m-%d')"
          git push
